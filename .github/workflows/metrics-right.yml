name: Metrics Right Column

on:
  schedule:
    - cron: "0 13 * * *" # AEDT summer time
    - cron: "0 14 * * *" # AEST winter time
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: schottenius03
          filename: metrics-right.svg
          template: classic

          # Sydney timezone
          config_timezone: Australia/Sydney

          base: ""

          # Contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          committer_branch: metrics
